# Copy to secret.yaml, fill in real values, then: kubectl apply -f secret.yaml
# NEVER commit secret.yaml (deploy/k8s/secret.yaml is gitignored).
apiVersion: v1
kind: Secret
metadata:
  name: agentic-rag-secrets
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "sk-ant-REPLACE-ME"
  VOYAGE_API_KEY: "pa-REPLACE-ME"
  DATABASE_URL: "postgresql://postgres:password@db.example.supabase.co:5432/postgres"
  # Optional — the researcher node is skipped when unset:
  # FIRECRAWL_API_KEY: "fc-REPLACE-ME"
